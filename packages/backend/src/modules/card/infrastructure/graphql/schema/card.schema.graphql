type Card {
  id: ID!
  cardNumber: String!
  status: CardStatus!
  balance: Float!
  createdAt: String!
}

enum CardStatus {
  ACTIVE
  BLOCKED
  EXPIRED
}

input IssueCardInput {
  cardNumber: String!
  initialBalance: Float!
}

type Query {
  card(id: ID!): Card
  cards: [Card!]!
}

type Mutation {
  issueCard(input: IssueCardInput!): Card!
  blockCard(id: ID!): Card!
}